repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.0
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        args: ["testify/"]
        additional_dependencies:
          - pydantic>=2.0.0
          - typer>=0.12.0
          - rich>=13.0.0
          - openai>=1.0.0
          - jinja2>=3.1.0
          - tenacity>=8.0.0
